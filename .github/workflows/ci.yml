name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: stockstream_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn clean verify -q
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t stockstream:${{ github.sha }} .

      - name: Verify image starts
        run: |
          docker run --rm -d \
            -e SPRING_PROFILES_ACTIVE=test \
            -e DB_HOST=localhost \
            -e KAFKA_BOOTSTRAP_SERVERS=localhost:9092 \
            --name stockstream-ci \
            stockstream:${{ github.sha }} || true
          sleep 5
          docker logs stockstream-ci || true
          docker stop stockstream-ci || true
