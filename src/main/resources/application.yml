server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:stockstream}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: stockstream-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.stockstream.model"
        spring.json.value.default.type: "com.stockstream.model.Tick"

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

stockstream:
  jwt-secret: ${JWT_SECRET:stockstream-secret-key-change-in-prod-must-be-at-least-256-bits!!}
  jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  openai-api-key: ${OPENAI_API_KEY:}
  openai-model: ${OPENAI_MODEL:gpt-3.5-turbo}
  openai-base-url: https://api.openai.com/v1
  tick-interval-ms: ${TICK_INTERVAL_MS:500}
  redis-cache-size: 50
  symbols:
    - RELIANCE
    - TCS
    - INFY
    - HDFCBANK
    - WIPRO
    - ICICIBANK
    - SBIN
    - BAJFINANCE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.stockstream: INFO
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
